name: CI/CD — ECO+ Machines

# ── Gatilhos ────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# ── Permissões mínimas por job ───────────────────────────────────
permissions:
  contents: read
  pull-requests: write   # permite comentar PRs com o resumo do build

# ── Variáveis de ambiente compartilhadas ────────────────────────
env:
  NODE_VERSION: '18'
  # O deploy na Vercel só roda quando há token configurado
  VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

# ════════════════════════════════════════════════════════════════
# JOB 1 — Qualidade: lint + testes + build
# ════════════════════════════════════════════════════════════════
jobs:
  quality:
    name: 🔍 Qualidade (Lint · Testes · Build)
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Node.js com cache do npm
      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # 3. Instalar dependências com lockfile exato
      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      # 4. Testes unitários + cobertura
      - name: Rodar testes
        run: npm test -- --watchAll=false --passWithNoTests --coverage --coverageReporters=text-summary
        env:
          CI: true

      # 5. Build de produção (usa secrets quando disponíveis)
      - name: Build de produção
        run: npm run build
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
          REACT_APP_API_USER:     ${{ secrets.REACT_APP_API_USER }}
          REACT_APP_API_PASS:     ${{ secrets.REACT_APP_API_PASS }}
          REACT_APP_API_KEY:      ${{ secrets.REACT_APP_API_KEY }}

      # 6. Salva o artefato de build (usado pelo job de deploy)
      - name: Salvar artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: build/
          retention-days: 1

  # ════════════════════════════════════════════════════════════════
  # JOB 2 — Docker: valida a imagem de produção
  # ════════════════════════════════════════════════════════════════
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: quality            # só roda se quality passar

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # Cache das camadas do Docker (reduz tempo de rebuild ~60%)
      - name: Cache de camadas Docker
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # Configura o Buildx (builder multi-plataforma)
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Cria o .env com as variáveis para o build do React dentro do Docker
      - name: Criar .env para build Docker
        run: |
          cat <<'EOF' > .env
          REACT_APP_API_BASE_URL=${{ secrets.REACT_APP_API_BASE_URL }}
          REACT_APP_API_USER=${{ secrets.REACT_APP_API_USER }}
          REACT_APP_API_PASS=${{ secrets.REACT_APP_API_PASS }}
          REACT_APP_API_KEY=${{ secrets.REACT_APP_API_KEY }}
          EOF

      # Build da imagem com cache de camadas
      - name: Build da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false                        # apenas valida; push ocorre só na main
          tags: ecoplus-machines:${{ github.sha }}
          build-args: |
            REACT_APP_API_BASE_URL=${{ secrets.REACT_APP_API_BASE_URL }}
            REACT_APP_API_USER=${{ secrets.REACT_APP_API_USER }}
            REACT_APP_API_PASS=${{ secrets.REACT_APP_API_PASS }}
            REACT_APP_API_KEY=${{ secrets.REACT_APP_API_KEY }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to:   type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Rotaciona o cache (evita crescimento infinito)
      - name: Rotacionar cache Docker
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ════════════════════════════════════════════════════════════════
  # JOB 3 — Deploy Preview (PRs → Vercel Preview URL)
  # ════════════════════════════════════════════════════════════════
  deploy-preview:
    name: 🔮 Deploy Preview (Vercel)
    runs-on: ubuntu-latest
    needs: quality
    # Roda apenas em PRs e somente se o token da Vercel estiver configurado
    if: |
      github.event_name == 'pull_request' &&
      secrets.VERCEL_TOKEN != ''
    environment:
      name: preview

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      # Pull das configurações do projeto na Vercel
      - name: Pull Vercel environment (Preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      # Build usando as variáveis de ambiente do projeto na Vercel
      - name: Build (Vercel)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      # Deploy sem promover para produção → gera uma Preview URL
      - name: Deploy Preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$URL" >> $GITHUB_OUTPUT

      # Comenta a Preview URL no PR
      - name: Comentar Preview URL no PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body: [
                '## 🚀 Deploy Preview pronto!',
                '',
                `**URL:** ${{ steps.deploy.outputs.preview_url }}`,
                '',
                `| Commit | Branch | Autor |`,
                `|--------|--------|-------|`,
                `| \`${{ github.sha }}\` | \`${{ github.head_ref }}\` | @${{ github.actor }} |`,
                '',
                '_O preview ficará disponível enquanto o PR estiver aberto._',
              ].join('\n')
            })

  # ════════════════════════════════════════════════════════════════
  # JOB 4 — Deploy Produção (push na main → Vercel Production)
  # ════════════════════════════════════════════════════════════════
  deploy-production:
    name: 🚀 Deploy Produção (Vercel)
    runs-on: ubuntu-latest
    needs: [quality, docker]  # exige que build e docker passem
    # Roda apenas em push direto à main (não em PRs)
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      secrets.VERCEL_TOKEN != ''
    environment:
      name: production
      url: ${{ steps.deploy.outputs.production_url }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      # Pull das configurações de produção
      - name: Pull Vercel environment (Production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Build de produção com as variáveis da Vercel
      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Deploy e promoção para produção → URL estável
      - name: Deploy para Produção
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "production_url=$URL" >> $GITHUB_OUTPUT

      - name: ✅ Deploy concluído
        run: |
          echo "::notice title=Deploy concluído::${{ steps.deploy.outputs.production_url }}"
name: CI/CD — ECO+ Machines

# ── Gatilhos ────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# ── Permissões — escrita necessária para o job de versão ────────
permissions:
  contents: write      # permite commit + tag de versão
  pull-requests: write # permite comentar PRs

# ── Variáveis compartilhadas ─────────────────────────────────────
env:
  NODE_VERSION: '18'
  VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — Qualidade: testes + build
  # ════════════════════════════════════════════════════════════════
  quality:
    name: 🔍 Qualidade (Testes · Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: Rodar testes
        run: npm test -- --watchAll=false --passWithNoTests --coverage --coverageReporters=text-summary
        env:
          CI: true

      - name: Build de produção
        run: npm run build
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
          REACT_APP_API_USER:     ${{ secrets.REACT_APP_API_USER }}
          REACT_APP_API_PASS:     ${{ secrets.REACT_APP_API_PASS }}
          REACT_APP_API_KEY:      ${{ secrets.REACT_APP_API_KEY }}

      - name: Salvar artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: build/
          retention-days: 1

  # ════════════════════════════════════════════════════════════════
  # JOB 2 — Docker: valida a imagem de produção
  # ════════════════════════════════════════════════════════════════
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Cache de camadas Docker
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Criar .env para build Docker
        run: |
          cat <<'EOF' > .env
          REACT_APP_API_BASE_URL=${{ secrets.REACT_APP_API_BASE_URL }}
          REACT_APP_API_USER=${{ secrets.REACT_APP_API_USER }}
          REACT_APP_API_PASS=${{ secrets.REACT_APP_API_PASS }}
          REACT_APP_API_KEY=${{ secrets.REACT_APP_API_KEY }}
          EOF

      - name: Build da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ecoplus-machines:${{ github.sha }}
          build-args: |
            REACT_APP_API_BASE_URL=${{ secrets.REACT_APP_API_BASE_URL }}
            REACT_APP_API_USER=${{ secrets.REACT_APP_API_USER }}
            REACT_APP_API_PASS=${{ secrets.REACT_APP_API_PASS }}
            REACT_APP_API_KEY=${{ secrets.REACT_APP_API_KEY }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to:   type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotacionar cache Docker
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ════════════════════════════════════════════════════════════════
  # JOB 3 — Versionamento automático (apenas na main)
  #
  # Lê o histórico de commits desde a última tag e decide o bump:
  #   feat!: / BREAKING CHANGE → major  (1.0.0 → 2.0.0)
  #   feat:                    → minor  (1.0.0 → 1.1.0)
  #   fix: / outros            → patch  (1.0.0 → 1.0.1)
  #
  # Depois:
  #   1. Atualiza package.json com npm version
  #   2. Cria um commit "chore(release): vX.Y.Z [skip ci]"
  #   3. Cria a tag git vX.Y.Z
  #   4. Exporta a nova versão para os jobs seguintes
  # ════════════════════════════════════════════════════════════════
  versioning:
    name: 🏷️ Versionamento Semântico
    runs-on: ubuntu-latest
    needs: [quality, docker]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag:         ${{ steps.bump.outputs.tag }}

    steps:
      - name: Checkout completo (com histórico de tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configurar identidade do git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calcular próxima versão e aplicar bump
        id: bump
        run: |
          # ── Versão atual do package.json ──────────────────────
          CURRENT=$(node -p "require('./package.json').version")
          echo "Versão atual: $CURRENT"

          # ── Última tag semântica no repositório ───────────────
          LAST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          echo "Última tag: ${LAST_TAG:-nenhuma}"

          # ── Commits desde a última tag (ou todos, se sem tag) ─
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline)
          fi
          echo "Commits analisados:"
          echo "$COMMITS"

          # ── Determinar tipo de bump ────────────────────────────
          BUMP="patch"

          if echo "$COMMITS" | grep -qiE '(BREAKING CHANGE|feat!|fix!|refactor!)'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE '^[a-f0-9]+ feat(\(.+\))?:'; then
            BUMP="minor"
          fi
          echo "Tipo de bump: $BUMP"

          # ── Aplicar bump via npm version ───────────────────────
          npm version "$BUMP" --no-git-tag-version --legacy-peer-deps
          NEW_VERSION=$(node -p "require('./package.json').version")
          TAG="v${NEW_VERSION}"
          echo "Nova versão: $NEW_VERSION  →  tag: $TAG"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG"                 >> $GITHUB_OUTPUT

      - name: Commit e tag da nova versão
        run: |
          TAG=${{ steps.bump.outputs.tag }}
          git add package.json package-lock.json
          git commit -m "chore(release): $TAG [skip ci]"
          git tag "$TAG"
          git push origin main --follow-tags

  # ════════════════════════════════════════════════════════════════
  # JOB 4 — Deploy Preview (PRs)
  # ════════════════════════════════════════════════════════════════
  deploy-preview:
    name: 🔮 Deploy Preview (Vercel)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request'
    environment:
      name: preview

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (Preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$URL" >> $GITHUB_OUTPUT

      - name: Comentar Preview URL no PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body: [
                '## 🚀 Deploy Preview pronto!',
                '',
                `**URL:** ${{ steps.deploy.outputs.preview_url }}`,
                '',
                `| Commit | Branch | Autor |`,
                `|--------|--------|-------|`,
                `| \`${{ github.sha }}\` | \`${{ github.head_ref }}\` | @${{ github.actor }} |`,
                '',
                '_O preview ficará disponível enquanto o PR estiver aberto._',
              ].join('\n')
            })

  # ════════════════════════════════════════════════════════════════
  # JOB 5 — Deploy Produção (main → Vercel Production)
  # Roda após o versionamento para que a versão já esteja no repo
  # ════════════════════════════════════════════════════════════════
  deploy-production:
    name: 🚀 Deploy Produção (Vercel)
    runs-on: ubuntu-latest
    needs: versioning
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.production_url }}

    steps:
      - name: Checkout do código (pós-versioning)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (Production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel) com nova versão
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          REACT_APP_VERSION: ${{ needs.versioning.outputs.new_version }}

      - name: Deploy para Produção
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "production_url=$URL" >> $GITHUB_OUTPUT

      - name: ✅ Deploy concluído
        run: |
          echo "::notice title=Deploy ${{ needs.versioning.outputs.tag }} concluído::${{ steps.deploy.outputs.production_url }}"